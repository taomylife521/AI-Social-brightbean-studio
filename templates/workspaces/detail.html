{% extends "base.html" %}
{% block page_title %}{{ workspace.name }}{% endblock %}

{% block content %}
<div style="max-width: 720px;">
    <!-- Workspace header -->
    <div style="margin-bottom: 32px;">
        <h2 style="
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.015em;
            margin-bottom: 4px;
        ">{{ workspace.name }}</h2>
        {% if workspace.description %}
        <p style="font-size: 0.9375rem; color: var(--text-secondary); line-height: 1.7;">{{ workspace.description }}</p>
        {% endif %}
    </div>

    <!-- Dynamic onboarding checklist -->
    {% include "onboarding/partials/_checklist.html" %}
</div>
{% endblock %}
