{% load analytics_extras %}
<div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px;">
    <div style="text-align: center; max-width: 460px;">
        <div style="position: relative; width: 72px; height: 72px; margin: 0 auto 20px;">
            <div style="width: 72px; height: 72px; border-radius: var(--radius-2xl); background: var(--surface-2); display: flex; align-items: center; justify-content: center;">
                {% include "partials/_platform_icon.html" with platform=active_account.platform size="lg" %}
            </div>
        </div>
        <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; letter-spacing: -0.01em;">
            Analytics aren't available for {{ active_account.get_platform_display }}
        </h2>
        <p style="font-size: 0.9375rem; color: var(--text-secondary); line-height: 1.6;">
            {{ analytics_unavailable_notice }}
        </p>
        <div style="margin-top: 28px; display: flex; gap: 10px; justify-content: center;">
            <a href="{% url 'composer:create_landing' workspace_id=workspace.id %}" class="btn-brand" style="width: auto; padding: 9px 20px;">Create a post</a>
        </div>
    </div>
</div>
